name: Publish package

on:
  #  push:
  #    tags:
  #      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  id-token: write # Required for OIDC authentication
  contents: write # Allows the workflow to read repository contents
concurrency:
  group: npm-release
  cancel-in-progress: false

# see: https://gist.github.com/jaywcjlove/a178278521a6f72c74525d3f1d9c4bf9
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org


      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: yarn install

      - name: Bump version (commit + tag)
        id: bump
        run: |
          npm version "${{ inputs.bump }}" -m "chore(release): %s [skip ci]"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          echo "tag=v$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        
      - name: Build package
        run: npm run build

      - name: Push commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin --tags

      - name: Publish to npm
        run: NODE_AUTH_TOKEN="" npm publish --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true